<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,initial-scale=1.0">

    <title>Avatar Builder</title>

    <meta name="theme-color"
          content="#8B0000">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="app">

    <!-- HEADER -->

    <header class="header">

        <img
            id="logo"
            src="assets/logo.png"
            alt="Logo">

        <h1>

            AVATAR BUILDER

        </h1>

        <p>

            Kỷ niệm sự kiện

        </p>

    </header>

    <!-- CANVAS -->

    <section class="workspace">

        <div class="canvas-wrapper">

            <canvas
                id="avatarCanvas"
                width="1080"
                height="1080">
            </canvas>

            <div
                id="dropZone">

                <div>

                    📷

                    <br><br>

                    Kéo ảnh vào đây

                    <br>

                    hoặc

                    <br><br>

                    bấm

                    <b>Chọn ảnh</b>

                </div>

            </div>

        </div>

    </section>

    <!-- TOOLBAR -->

    <section class="toolbar">

        <button id="btnUpload">

            📷

            <span>

                Chọn ảnh

            </span>

        </button>

        <button id="btnZoomIn">

            ➕

        </button>

        <button id="btnZoomOut">

            ➖

        </button>

        <button id="btnRotateLeft">

            ↺

        </button>

        <button id="btnRotateRight">

            ↻

        </button>

        <button id="btnReset">

            ♻

        </button>

        <button id="btnDownload">

            💾

        </button>

    </section>

</div>

<input

type="file"

id="imageInput"

accept="image/*"

hidden>

<script src="js/app.js"></script>

</body>

</html>

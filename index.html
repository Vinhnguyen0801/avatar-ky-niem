<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Agribank Avatar Builder</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

</head>

<body>

<div class="container">

    <header class="header">

        <img src="assets/logo.png" class="logo" alt="Logo">

        <h1>Avatar Builder</h1>

        <p>Kỷ niệm 8 năm Agribank Hà Tĩnh II</p>

    </header>

    <main>

        <div class="canvas-container">

            <canvas id="canvas" width="2048" height="2048"></canvas>

        </div>

    </main>

    <footer>

        <button id="btnUpload">📷 Chọn ảnh</button>

        <button id="btnZoomIn">＋</button>

        <button id="btnZoomOut">－</button>

        <button id="btnRotateLeft">↺</button>

        <button id="btnRotateRight">↻</button>

        <button id="btnReset">♻</button>

        <button id="btnDownload">💾</button>

    </footer>

</div>

<input
    id="imageInput"
    type="file"
    accept="image/*"
    hidden>

<script src="js/app.js"></script>

</body>

</html>

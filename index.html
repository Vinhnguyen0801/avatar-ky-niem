<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agribank Avatar Builder</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>

</head>

<body>

<div class="app">

<header class="header">

<img id="logo" src="assets/logo.png" alt="Logo">

<h1>Avatar Builder</h1>

<p>Kỷ niệm 8 năm Agribank Hà Tĩnh II</p>

</header>

<div class="workspace">

<canvas id="canvas"></canvas>

</div>

<div class="toolbar">

<button id="btnUpload">📷 Chọn ảnh</button>

<button id="btnZoomIn">+</button>

<button id="btnZoomOut">−</button>

<button id="btnRotateLeft">↺</button>

<button id="btnRotateRight">↻</button>

<button id="btnReset">♻</button>

<button id="btnDownload">💾 Lưu</button>

</div>

<input
type="file"
id="imageInput"
accept="image/*"
hidden>

</div>

<script src="js/app.js"></script>

</body>

</html>

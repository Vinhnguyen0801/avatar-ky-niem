<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agribank Avatar Builder</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>

</head>

<body>

<div class="app">

<header class="header">

    <img
        class="header-logo"
        src="assets/logo.png"
        alt="Agribank Chi nhánh Hà Tĩnh II">

    <h1 class="header-title">
        TRÌNH TẠO ẢNH ĐẠI DIỆN
    </h1>

    <p class="header-subtitle">
        Kỷ niệm 8 năm thành lập
    </p>

</header>

<div class="workspace">

<canvas id="canvas"></canvas>

</div>

<div class="toolbar">

<button id="btnUpload">📷 Chọn ảnh</button>

<button id="btnZoomIn">
    <i class="fa-solid fa-plus"></i>
</button>

<button id="btnZoomOut">
    <i class="fa-solid fa-minus"></i>
</button>

<button id="btnRotateLeft">
    <i class="fa-solid fa-rotate-left"></i>
</button>

<button id="btnRotateRight">
    <i class="fa-solid fa-rotate-right"></i>
</button>

<button id="btnReset">♻</button>

<button id="btnDownload">
    <i class="fa-solid fa-download"></i>
    Tải ảnh
</button>

</div>

<input
type="file"
id="imageInput"
accept="image/*"
hidden>

</div>

<script src="js/app.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agribank Avatar Builder</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
</head>

<body>

<div class="container">

    <header>

        <img src="assets/logo.png" id="logo">

        <h1>AVATAR BUILDER</h1>

        <p>Kỷ niệm 8 năm Agribank Hà Tĩnh II</p>

    </header>

    <div class="canvas-area">

        <canvas id="canvas" width="2048" height="2048"></canvas>

    </div>

    <div class="toolbar">

        <button id="uploadBtn">📷 Chọn ảnh</button>

        <button id="zoomInBtn">＋</button>

        <button id="zoomOutBtn">－</button>

        <button id="rotateLeftBtn">↺</button>

        <button id="rotateRightBtn">↻</button>

        <button id="resetBtn">♻</button>

        <button id="downloadBtn">💾</button>

    </div>

</div>

<input
type="file"
id="imageInput"
accept="image/*"
hidden>

<script src="js/canvas.js"></script>
<script src="js/image.js"></script>
<script src="js/toolbar.js"></script>
<script src="js/download.js"></script>
<script src="js/app.js"></script>

</body>
</html>

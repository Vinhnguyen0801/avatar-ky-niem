<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Kỷ Niệm</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>🎉 Avatar Kỷ Niệm</h1>

    <p class="sub">
        Chọn ảnh để tạo ảnh đại diện
    </p>

    <div class="preview">

        <img id="previewImage">

        <span id="placeholder">
            Chưa chọn ảnh
        </span>

    </div>

    <input
        type="file"
        id="fileInput"
        accept="image/*"
        hidden>

    <button id="chooseBtn">

        📷 Chọn ảnh

    </button>

</div>

<script src="js/script.js"></script>

</body>

</html>

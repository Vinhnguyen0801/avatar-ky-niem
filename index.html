<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Kỷ Niệm</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:500px;
            background:white;
            border-radius:20px;
            padding:40px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.15);
        }

        h1{
            color:#b10000;
        }

        p{
            color:#666;
        }

        button{
            padding:15px 30px;
            border:none;
            background:#009933;
            color:white;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background:#007722;
        }

    </style>

</head>
<body>

<div class="box">

<h1>🎉 Website Avatar Kỷ Niệm</h1>

<p>Dự án đang được xây dựng.</p>

<button>Bắt đầu</button>

</div>

</body>
</html>
